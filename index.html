<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkWhere SG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Singapore carpark availability</p>
          <h1>Search carpark availability.</h1>
          <p class="hero-text">
            Only carparks available from HDB and LTA API can be searched.
          </p>
        </div>
        <div class="hero-panel">
          <div class="status-row">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Loading official carpark data...</span>
          </div>
          <button class="ghost-button" id="refresh-button" type="button">
            Refresh live data
          </button>
        </div>
      </header>

      <main class="app-grid">
        <section class="search-panel">
          <label class="search-label" for="search-input">Search carpark</label>
          <div class="search-box">
            <input
              id="search-input"
              type="search"
              placeholder="Try Hougang, Ang Mo Kio, Albert Centre..."
              autocomplete="off"
            />
            <button id="clear-button" class="icon-button" type="button" aria-label="Clear search">
              x
            </button>
          </div>

          <div class="search-meta">
            <span id="result-count">Preparing carpark index...</span>
            <span id="updated-at">Waiting for first live refresh</span>
          </div>

          <div id="suggestions" class="suggestions" aria-live="polite"></div>
        </section>

        <section class="results-panel">
          <div class="section-heading">
            <h2>Live availability</h2>
            <p id="source-note">Loading source summary...</p>
          </div>

          <div id="results" class="results-list" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <template id="carpark-card-template">
      <article class="carpark-card">
        <div class="card-header">
          <div>
            <p class="card-kicker"></p>
            <h3 class="card-title"></h3>
          </div>
          <div class="availability-pill"></div>
        </div>

        <p class="card-address"></p>

        <dl class="detail-grid">
          <div>
            <dt>Total lots</dt>
            <dd class="total-lots"></dd>
          </div>
          <div>
            <dt>Available now</dt>
            <dd class="available-lots"></dd>
          </div>
          <div>
            <dt>Carpark code</dt>
            <dd class="carpark-code"></dd>
          </div>
          <div>
            <dt>Updated</dt>
            <dd class="update-time"></dd>
          </div>
        </dl>

        <p class="vehicle-breakdown"></p>
        <p class="map-link-row">
          <a class="map-link" target="_blank" rel="noreferrer noopener">View on Google Maps</a>
        </p>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
